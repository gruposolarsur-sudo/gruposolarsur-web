<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF6FF"/>
      <stop offset="0.48" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#DDEBFF"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1070 430) rotate(90) scale(410 560)">
      <stop stop-color="#BAE6FD" stop-opacity="0.78"/>
      <stop offset="0.48" stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dashboardShell" x1="704" y1="150" x2="1308" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F1FF"/>
    </linearGradient>
    <linearGradient id="screen" x1="748" y1="204" x2="1264" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102B6F"/>
      <stop offset="1" stop-color="#061331"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="812" y1="464" x2="1202" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FACC15"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="solarPanel" x1="432" y1="506" x2="654" y2="654" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#071B44"/>
    </linearGradient>
    <linearGradient id="flowStroke" x1="420" y1="330" x2="1350" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="softShadow" x="608" y="104" width="820" height="650" filterUnits="userSpaceOnUse">
      <feOffset dy="28"/>
      <feGaussianBlur stdDeviation="30"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.08 0 0 0 0 0.22 0 0 0 0.18 0"/>
    </filter>
    <filter id="cardShadow" x="300" y="160" width="1140" height="650" filterUnits="userSpaceOnUse">
      <feOffset dy="18"/>
      <feGaussianBlur stdDeviation="20"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.08 0 0 0 0 0.22 0 0 0 0.14 0"/>
    </filter>
    <filter id="activeGlow" x="300" y="150" width="1160" height="650" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <style>
      .data-line {
        stroke-dasharray: 12 18;
        animation: dataFlow 5.5s linear infinite;
      }
      .data-line.fast {
        animation-duration: 4.2s;
      }
      .pulse-ok {
        animation: pulseOk 2.6s ease-in-out infinite;
      }
      .pulse-warn {
        animation: pulseWarn 3.2s ease-in-out infinite;
      }
      .float-card {
        animation: floatCard 7s ease-in-out infinite;
      }
      .float-card.delay {
        animation-delay: -2.4s;
      }
      @keyframes dataFlow {
        to { stroke-dashoffset: -180; }
      }
      @keyframes pulseOk {
        0%, 100% { opacity: 0.72; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.16); }
      }
      @keyframes pulseWarn {
        0%, 100% { opacity: 0.62; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      @keyframes floatCard {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </defs>

